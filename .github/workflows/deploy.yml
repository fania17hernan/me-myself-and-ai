name: Build and deploy

# Validation runs before every deploy, so a stale `fast` fact or an
# undefined glossary term blocks the site going out rather than shipping
# quietly. That is the whole point of the governance work in
# design/TAXONOMY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Mondays 08:00 UTC. Catches facts that went overdue while nobody
    # was pushing, which is exactly when they go unnoticed.
    - cron: '0 8 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No install step. The build has zero dependencies on purpose.
      - name: Validate content
        run: node build/validate.mjs .

      - name: Build
        run: node build/build.mjs .

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
